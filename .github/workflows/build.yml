name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap copy android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: myTrack-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap copy android

      - name: Decode keystore (if provided via secret)
        if: ${{ secrets.KEYSTORE_BASE64 != '' && secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/release.keystore"

      - name: Generate keystore & inject signing config
        run: |
          KEYSTORE="$GITHUB_WORKSPACE/release.keystore"
          if [ ! -f "$KEYSTORE" ]; then
            keytool -genkey -v \
              -keystore "$KEYSTORE" \
              -alias release \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=myTrack, OU=Dev, O=NeuraLumina, L=Unknown, ST=Unknown, C=US" \
              -noprompt
          fi

          sed -i "/buildTypes {/i\\
          signingConfigs {\\
              release {\\
                  storeFile file('$KEYSTORE')\\
                  storePassword 'android'\\
                  keyAlias 'release'\\
                  keyPassword 'android'\\
              }\\
          }\\
          " android/app/build.gradle

          sed -i "/minifyEnabled false/a\\
                  signingConfig signingConfigs.release\\
          " android/app/build.gradle

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: myTrack-release
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
